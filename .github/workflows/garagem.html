<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garagem | Asphalt Wolves</title>
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: #060b1a; /* O mesmo azul escuro do site principal */
            color: white;
            padding-top: 100px;
        }

    
        .navbar {
            width: 100%;
            padding: 20px 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(6, 11, 26, 0.95);
            backdrop-filter: blur(10px);
            position: fixed;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(47, 123, 255, 0.2);
        }
        .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; color: white; font-weight: bold; }
        .nav-logo img { width: 40px; border-radius: 50%; }
        .btn-back { text-decoration: none; color: #2f7bff; font-weight: bold; transition: 0.3s; }
        .btn-back:hover { color: white; }

        /* CONTAINER DA GALERIA */
        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; text-align: center; }
        h1 { font-size: 48px; margin-bottom: 10px; font-weight: 900; }
        .accent { color: #2f7bff; }
        p { color: #94a3b8; margin-bottom: 50px; font-size: 18px; }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
        }

     
        .car-card {
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            background: #0f172a;
            border: 1px solid rgba(255, 255, 255, 0.05);
            cursor: pointer;
            transition: 0.4s;
        }

        .car-card img {
            width: 100%;
            height: 280px;
            object-fit: cover;
            display: block;
            transition: 0.6s;
        }

        /* EFEITOS AO PASSAR O MOUSE */
        .car-card:hover { transform: translateY(-10px); border-color: #2f7bff; box-shadow: 0 10px 30px rgba(47, 123, 255, 0.2); }
        .car-card:hover img { transform: scale(1.1); filter: brightness(1.2); }

        .car-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 20px;
            background: linear-gradient(transparent, rgba(6, 11, 26, 0.95));
            text-align: left;
        }
        .car-overlay h3 { font-size: 20px; margin-bottom: 4px; }
        .car-overlay span { color: #2f7bff; font-size: 14px; font-weight: bold; text-transform: uppercase; }

        @media (max-width: 768px) {
            h1 { font-size: 32px; }
            .gallery-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="index.html" class="nav-logo">
            <img src="logo.png" alt="Logo">
            <span>Asphalt Wolves</span>
        </a>
        <a href="index.html" class="btn-back">← Voltar para Recrutamento</a>
    </nav>

    <div class="container">
        <h1>Nossa <span class="accent">Garagem</span></h1>
        <p>A força da alcateia refletida em cada detalhe.</p>

        <div class="gallery-grid">
            
            <div class="car-card">
                <img src="foto1.jpg" alt="Carro Wolves">
                <div class="car-overlay">
                    <span>Piloto: Asw_King</span>
                    <h3>Nissan GT-R Nismo</h3>
                </div>
            </div>

            <div class="car-card">
                <img src="foto2.jpg" alt="Carro Wolves">
                <div class="car-overlay">
                    <span>Encontro de Equipe</span>
                    <h3>Comboio Noturno</h3>
                </div>
            </div>

            <div class="car-card">
                <img src="foto3.jpg" alt="Carro Wolves">
                <div class="car-overlay">
                    <span>Destaque</span>
                    <h3>Lamborghini Huracán</h3>
                </div>
            </div>

            </div>
    </div>

</body>
</html>
