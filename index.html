<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asphalt Wolves | Recrutamento</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }

        /* SCROLLBAR PERSONALIZADA */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #060b1a; }
        ::-webkit-scrollbar-thumb { background: #2f7bff; border-radius: 10px; }

        body {
            font-family: 'Inter', Arial, sans-serif;
            background: radial-gradient(circle at center, #133c8b 0%, #0a1d40 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        .navbar {
            width: 100%;
            padding: 20px 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(10, 29, 64, 0.9);
            backdrop-filter: blur(12px);
            position: fixed;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .nav-logo { display: flex; align-items: center; gap: 10px; font-weight: bold; text-decoration: none; color: white; }
        .nav-logo img { width: 35px; }

        .btn-nav {
            background: #2f7bff !important;
            color: white !important;
            padding: 10px 22px;
            border-radius: 10px;
            font-weight: 700;
            text-decoration: none;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            margin-top: 120px;
            padding: 0 20px 40px;
        }

        #sobre {
            margin-bottom: 80px;
            padding: 40px;
            background: rgba(15, 23, 42, 0.4);
            border-radius: 20px;
            border: 1px solid rgba(47, 123, 255, 0.1);
            backdrop-filter: blur(10px);
        }
        #sobre h2 { color: #2f7bff; margin-bottom: 15px; font-size: 28px; }
        #sobre p { color: #94a3b8; line-height: 1.6; font-size: 16px; }

        .section-title { margin-bottom: 30px; }
        .section-title span { color: #2f7bff; font-size: 12px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; }
        .section-title h2 { font-size: 32px; margin-top: 5px; }

        .requirements-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 80px;
        }
        .req-card {
            background: rgba(15, 23, 42, 0.5);
            padding: 30px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .req-icon {
            width: 40px; height: 40px;
            background: rgba(47, 123, 255, 0.1);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 20px; color: #2f7bff; font-size: 20px;
        }

        .form-section { display: flex; justify-content: center; width: 100%; padding-bottom: 100px; }
        .card {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 24px;
            width: 100%;
            max-width: 650px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        label { font-size: 11px; font-weight: bold; color: #cbd5e1; margin-top: 18px; display: block; text-transform: uppercase; }
        input, textarea, select {
            width: 100%; padding: 12px; margin-top: 6px; border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05);
            color: white; font-family: inherit;
        }
        
        .btn-submit {
            width: 100%; padding: 15px; margin-top: 25px; border: none; border-radius: 12px;
            background: #2f7bff; color: white; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .btn-submit:hover { background: #1b57c9; }

        .spinner {
            margin: 20px auto; width: 40px; height: 40px;
            border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid #2f7bff;
            border-radius: 50%; animation: spin 1s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        @media (max-width: 768px) { .requirements-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="#" class="nav-logo"><span>Lobos de Asfalto</span></a>
        <a href="#entrar" class="btn-nav">Entrar pro time</a>
    </nav>

    <div class="container">
        <div id="sobre">
            <h2>Sobre a Asphalt Wolves</h2>
            <p>Somos uma alcateia que preza pela lealdade e pela evolução constante. Respeito e amizade acima de tudo.</p>
        </div>

        <div id="requisitos" class="section-title">
            <span>REGRAS</span>
            <h2>Requisitos básicos</h2>
        </div>

        <div class="requirements-grid">
            <div class="req-card"><div class="req-icon">⏱</div><h4>+10 horas</h4><p>Tempo mínimo de jogo.</p></div>
            <div class="req-card"><div class="req-icon">👤</div><h4>15 anos+</h4><p>Idade mínima exigida.</p></div>
        </div>

        <div id="entrar" class="form-section">
            <div class="card" id="formContainer">
                <h3 style="text-align: center;">Candidatura</h3>
                
                <form id="recruitForm">
                    <label>Nome Real e Gamertag *</label>
                    <input type="text" id="nome_game" required>
                    
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                        <div><label>Idade *</label><input type="number" id="age" required></div>
                        <div><label>Horas de Jogo *</label><input type="number" id="hours" required></div>
                    </div>

                    <label>Trabalha/Estuda? Está de férias? *</label>
                    <input type="text" id="rotina" required>

                    <label>Horários disponíveis? *</label>
                    <input type="text" id="horarios" required>

                    <label>Experiência como ADM? Por que saiu? *</label>
                    <textarea id="adm_exp" rows="2" required></textarea>

                    <label>Ajudará no recrutamento? *</label>
                    <select id="compromisso" required>
                        <option value="">Selecione...</option>
                        <option value="Sim">Sim</option>
                        <option value="Não">Não</option>
                    </select>

                    <label>Por que a Wolves? *</label>
                    <textarea id="why" rows="3" required></textarea>

                    <button type="submit" class="btn-submit">Enviar para a Alcateia</button>
                </form>

                <div id="loading" style="display:none; text-align: center; padding: 20px;">
                    <p>Enviando...</p><div class="spinner"></div>
                </div>
                <div id="result" style="display:none; text-align: center; margin-top: 20px;"></div>
            </div>
        </div>
    </div>

    <script>
        // --- BLOQUEIO DE REENVIO ---
        window.onload = function() {
            if (localStorage.getItem("enviadoWolves") === "true") {
                document.getElementById("formContainer").innerHTML = `
                    <div style="text-align: center; padding: 30px;">
                        <h3 style="color:#fb7185; margin-bottom:10px;">Acesso Restrito</h3>
                        <p>Sua candidatura já foi enviada. Não é permitido enviar múltiplas fichas.</p>
                    </div>
                `;
            }
        };

        document.getElementById("recruitForm").addEventListener("submit", async function(e){
            e.preventDefault();

            const webhookURL = "SEU_WEBHOOK_AQUI"; // <--- COLOQUE O SEU LINK AQUI

            document.getElementById("recruitForm").style.display = "none";
            document.getElementById("loading").style.display = "block";

            // Captura de IP (Segurança extra)
            let userIP = "Não capturado";
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                userIP = data.ip;
            } catch (err) { console.log("Erro IP"); }

            const dados = {
                nome: document.getElementById("nome_game").value,
                idade: document.getElementById("age").value,
                horas: document.getElementById("hours").value,
                rotina: document.getElementById("rotina").value,
                horarios: document.getElementById("horarios").value,
                adm: document.getElementById("adm_exp").value,
                ajuda: document.getElementById("compromisso").value,
                motivo: document.getElementById("why").value
            };

            const msgDiscord = {
                embeds: [{
                    title: "🐺 NOVA FICHA RECEBIDA",
                    color: 3111935,
                    fields: [
                        { name: "👤 Nome/Gamertag", value: dados.nome, inline: true },
                        { name: "🎂 Idade", value: dados.idade, inline: true },
                        { name: "⏱ Horas", value: dados.horas, inline: true },
                        { name: "📅 Rotina", value: dados.rotina },
                        { name: "⏰ Horários", value: dados.horarios },
                        { name: "🛠 Exp. ADM", value: dados.adm },
                        { name: "🤝 Recrutamento", value: dados.ajuda, inline: true },
                        { name: "📝 Motivo", value: dados.motivo },
                        { name: "🌐 IP do Candidato", value: `||${userIP}||` } // Em spoiler no Discord
                    ],
                    timestamp: new Date()
                }]
            };

            fetch(webhookURL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(msgDiscord)
            }).then(() => {
                // SALVA O BLOQUEIO NO NAVEGADOR
                localStorage.setItem("enviadoWolves", "true");

                setTimeout(() => {
                    document.getElementById("loading").style.display = "none";
                    const res = document.getElementById("result");
                    res.style.display = "block";

                    if(parseInt(dados.idade) >= 15) {
                        res.innerHTML = `<h3 style="color:#34d399">✔ Sucesso!</h3><p>Ficha enviada. Entraremos em contato.</p>`;
                        setTimeout(() => { window.location.href = "https://chat.whatsapp.com/BlfeXFuGZ6N3PqbWtOdedY"; }, 3000);
                    } else {
                        res.innerHTML = `<h3 style="color:#fb7185">Enviado</h3><p>Idade abaixo do requisito. Aguarde análise manual.</p>`;
                    }
                }, 2000);
            });
        });
    </script>
</body>
</html>
