<!DOCTYPE html>

<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asphalt Wolves | Recrutamento</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(135deg,#0a1d40,#133c8b);
display:flex;
align-items:center;
justify-content:center;
min-height:100vh;
color:white;
}

.card{
background:rgba(0,0,0,0.45);
padding:40px;
border-radius:20px;
width:90%;
max-width:520px;
box-shadow:0 10px 35px rgba(0,0,0,0.4);
backdrop-filter:blur(8px);
}

.logo{
text-align:center;
margin-bottom:15px;
}

.logo img{
width:130px;
}

h3{
margin:5px 0;
text-align:center;
font-size:22px;
}

.sub{
text-align:center;
font-size:14px;
opacity:0.8;
margin-bottom:25px;
}

label{
display:block;
margin-top:14px;
font-size:14px;
}

input, textarea{
width:100%;
padding:10px;
margin-top:6px;
border-radius:8px;
border:none;
outline:none;
background:#163a7a;
color:white;
}

textarea{
resize:none;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

button{
margin-top:20px;
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#2f7bff;
color:white;
font-size:15px;
cursor:pointer;
}

button:hover{
background:#1b57c9;
}

.center{
display:none;
text-align:center;
}

.spinner{
margin:20px auto;
width:40px;
height:40px;
border:4px solid rgba(255,255,255,0.3);
border-top:4px solid white;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

.join{
display:inline-block;
margin-top:15px;
padding:10px 18px;
background:#2f7bff;
color:white;
text-decoration:none;
border-radius:8px;
}

.approved h2{
color:#7cffc1;
}

.rejected h2{
color:#ff7c7c;
}

</style>

</head>

<body>

<div class="card">

<div class="logo">
<img src="logo.png">
</div>

<div id="formArea">

<h3>Entrar para a Asphalt Wolves</h3>
<p class="sub">Preencha os dados abaixo para se candidatar.</p>

<form id="recruitForm">

<label>Gamertag / Nome no jogo *</label> <input type="text" id="gamertag" required placeholder="Seu nome no jogo">

<div class="grid">

<div>
<label>Sua idade</label>
<input type="number" id="age" placeholder="Ex: 18">
</div>

<div>
<label>Horas jogadas</label>
<input type="number" id="hours" placeholder="Ex: 50">
</div>

</div>

<label>Instagram (opcional)</label> <input type="text" id="instagram" placeholder="@seuinstagram">

<label>Por que quer entrar na Wolves? *</label>

<textarea id="why" rows="4" required placeholder="Conte um pouco sobre você e por que quer fazer parte da equipe..."></textarea>

<button type="submit">Enviar candidatura</button>

</form>

</div>

<div class="center" id="loading">
<h3>A alcateia está analisando sua candidatura...</h3>
<div class="spinner"></div>
<p>Por favor aguarde</p>
</div>

<div class="center" id="result"></div>

</div>

<script>

document.getElementById("recruitForm").addEventListener("submit", function(e){

e.preventDefault()

let age = parseInt(document.getElementById("age").value)
let hours = parseInt(document.getElementById("hours").value)

document.getElementById("formArea").style.display="none"
document.getElementById("loading").style.display="block"

setTimeout(function(){

document.getElementById("loading").style.display="none"
let result = document.getElementById("result")
result.style.display="block"

if(age >= 15 && hours >= 10){

result.className="center approved"
result.innerHTML = `
<h2>✔ Candidatura aprovada!</h2>
<p>Você atende aos requisitos da alcateia.</p>
<a href="https://chat.whatsapp.com/BlfeXFuGZ6N3PqbWtOdedY" target="_blank" class="join">
Entrar na comunidade
</a>
`

}else{

let reason=""

if(age < 15){
reason="Idade mínima necessária: 15 anos."
}
else if(hours < 10){
reason="É necessário possuir pelo menos 10 horas de jogo."
}
else{
reason="Sua candidatura não atendeu aos critérios da equipe."
}

result.className="center rejected"
result.innerHTML = `
<h2>✖ Candidatura recusada</h2>
<p>${reason}</p>
`

}

},2000)

})

</script>

</body>
</html>
