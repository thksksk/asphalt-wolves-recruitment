<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garagem | Asphalt Wolves</title>
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: #060b1a;
            color: white;
            padding-top: 100px;
        }

        /* NAVBAR SIMPLIFICADA */
        .navbar {
            width: 100%;
            padding: 20px 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(6, 11, 26, 0.9);
            backdrop-filter: blur(10px);
            position: fixed;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(47, 123, 255, 0.2);
        }
        .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; color: white; font-weight: bold; }
        .nav-logo img { width: 40px; border-radius: 50%; }
        .btn-back {
            text-decoration: none;
            color: #2f7bff;
            font-weight: bold;
            font-size: 14px;
            transition: 0.3s;
        }
        .btn-back:hover { color: white; }

        /* GRID DE FOTOS */
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; text-align: center; }
        h1 { font-size: 40px; margin-bottom: 10px; color: #2f7bff; }
        p { color: #94a3b8; margin-bottom: 40px; }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }

        .photo-card {
            position: relative;
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
            background: #0f172a;
            transition: 0.3s;
        }

        .photo-card img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            display: block;
            transition: 0.5s;
        }

        .photo-card:hover { transform: translateY(-10px); border-color: #2f7bff; }
        .photo-card:hover img { transform: scale(1.1); }

        .photo-info {
            padding: 15px;
            text-align: left;
            background: linear-gradient(transparent, rgba(0,0,0,0.8));
            position: absolute;
            bottom: 0;
            width: 100%;
        }

        @media (max-width: 768px) {
            .gallery-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="index.html" class="nav-logo">
            <img src="logo.png" alt="Logo">
            <span>Asphalt Wolves</span>
        </a>
        <a href="index.html" class="btn-back">← Voltar para Início</a>
    </nav>

    <div class="container">
        <h1>Nossa Garagem</h1>
        <p>Conheça as máquinas que dominam as ruas sob a bandeira da Wolves.</p>

        <div class="gallery-grid">
            <div class="photo-card">
                <img src="fundo.png" alt="Carro 1">
                <div class="photo-info"><h4>Dodge Challenger ASW</h4></div>
            </div>
            
            <div class="photo-card">
                <img src="fundo.png" alt="Carro 2">
                <div class="photo-info"><h4>Nissan GT-R Edição Lobo</h4></div>
            </div>

            <div class="photo-card">
                <img src="fundo.png" alt="Carro 3">
                <div class="photo-info"><h4>BMW M4 Custom</h4></div>
            </div>
            </div>
    </div>

</body>
</html>
